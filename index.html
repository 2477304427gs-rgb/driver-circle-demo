<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>滴滴司机端 - 首页</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <div class="home-header">
      <div class="avatar avatar-sm">司</div>
      <div class="status">
        <div class="status-label">今日状态</div>
        <div class="status-value">在线接单中 · 望京</div>
      </div>
      <div class="header-action">🔔</div>
    </div>

    <div class="feature-grid">
      <a href="circle.html" class="feature-item">
        <div class="feature-icon circle">🚗</div>
        <span class="feature-name">附近司机圈</span>
      </a>
      <div class="feature-item">
        <div class="feature-icon shunlu">🏠</div>
        <span class="feature-name">顺路单</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon order">📋</div>
        <span class="feature-name">我的订单</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon wallet">💰</div>
        <span class="feature-name">钱包</span>
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="card-title">今日数据</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);text-align:center;">
        <div>
          <div style="font-size:20px;font-weight:600;color:var(--primary);">5</div>
          <div style="font-size:12px;color:var(--text-secondary);">完成单量</div>
        </div>
        <div>
          <div style="font-size:20px;font-weight:600;color:var(--primary);">¥386</div>
          <div style="font-size:12px;color:var(--text-secondary);">今日流水</div>
        </div>
        <div>
          <div style="font-size:20px;font-weight:600;color:var(--primary);">28km</div>
          <div style="font-size:12px;color:var(--text-secondary);">服务里程</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🌙 夜间返程助手</div>
      <div class="card-desc">
        远途单返程难？试试司机互助圈，拼车回家更安全、更省钱。
      </div>
      <a href="circle.html" class="btn btn-primary" style="margin-top:12px;">进入互助圈</a>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
